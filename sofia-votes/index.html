<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofia Elections Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="map"></div>

  <aside id="controls">
    <h1>Sofia Elections</h1>

    <label for="election-select">Election</label>
    <select id="election-select"></select>

    <label for="variable-select">Color by</label>
    <select id="variable-select"></select>

    <div id="legend"></div>
  </aside>

  <aside id="detail" class="hidden">
    <button id="detail-close" aria-label="Close">&times;</button>
    <h2 id="detail-title"></h2>
    <div id="detail-address"></div>
    <dl id="detail-summary"></dl>
    <h3>Results</h3>
    <table id="detail-parties"></table>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./main.js"></script>
</body>
</html>
